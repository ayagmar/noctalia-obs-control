name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick qt6-declarative-dev-tools

      - name: Validate JSON
        run: |
          python -m json.tool manifest.json >/dev/null
          python -m json.tool i18n/en.json >/dev/null

      - name: Validate settings file is not tracked
        run: |
          if git ls-files --error-unmatch settings.json >/dev/null 2>&1; then
            echo "settings.json must not be committed"
            exit 1
          fi

      - name: Validate helper scripts
        run: |
          node --check scripts/obsctl.js
          bash -n scripts/obsctl
          bash -n scripts/run-action
          bash -n scripts/open-path

      - name: Lint QML
        continue-on-error: true
        run: |
          if command -v qmllint >/dev/null 2>&1; then
            qmllint ./*.qml
          fi

      - name: Validate preview image size
        run: |
          size="$(identify -format '%wx%h' preview.png)"
          test "$size" = "960x540"
